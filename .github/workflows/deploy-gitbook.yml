# GitHub Actions workflow for deploying GitBook to GitHub Pages
name: Deploy GitBook

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'chapters/**'
      - 'front_matter/**'
      - 'appendices/**'
      - 'figures/**'
      - 'SUMMARY.md'
      - 'INTRODUCTION.md'
      - 'book.json'
      - 'styles.css'
      - 'scripts/qa_gitbook_content.ps1'
      - '.github/workflows/deploy-gitbook.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HonKit
        run: |
          npm install honkit

      - name: Install GitBook plugins
        run: |
          if [ -f "book.json" ]; then
            npx honkit install
          fi

      - name: Run content QA checks
        shell: pwsh
        run: |
          ./scripts/qa_gitbook_content.ps1

      - name: Build GitBook
        run: |
          npx honkit build . ./public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
