# GitHub Actions workflow for deploying GitBook to GitHub Pages
name: Deploy GitBook

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'chapters/**'
      - 'front_matter/**'
      - 'appendices/**'
      - 'figures/**'
      - 'SUMMARY.md'
      - 'INTRODUCTION.md'
      - 'book.json'
      - 'styles.css'
      - 'scripts/qa_gitbook_content.ps1'
      - '.github/workflows/deploy-gitbook.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HonKit
        run: |
          npm install honkit

      - name: Install GitBook plugins
        run: |
          if [ -f "book.json" ]; then
            npx honkit install
          fi

      - name: Run content QA checks
        shell: pwsh
        run: |
          ./scripts/qa_gitbook_content.ps1

      - name: Convert GitBook Cloud hint tags to blockquotes
        run: |
          # GitBook Cloud supports {% hint %} natively, but HonKit does not.
          # Convert to blockquotes so the HonKit build succeeds.
          STYLE_MAP_info="ℹ️ **Info**"
          STYLE_MAP_warning="⚠️ **Warning**"
          STYLE_MAP_danger="🚨 **Danger**"
          STYLE_MAP_success="✅ **Success**"
          STYLE_MAP_tip="💡 **Tip**"
          for f in $(find . -name '*.md' -not -path './node_modules/*'); do
            if grep -q '{% hint' "$f"; then
              python3 -c "
          import re, sys
          style_map = {'info': '$STYLE_MAP_info', 'warning': '$STYLE_MAP_warning', 'danger': '$STYLE_MAP_danger', 'success': '$STYLE_MAP_success', 'tip': '$STYLE_MAP_tip'}
          text = open(sys.argv[1]).read()
          def replace_hint(m):
              style = m.group(1)
              content = m.group(2).strip()
              label = style_map.get(style, '**Note**')
              lines = content.split('\n')
              quoted = '\n'.join('> ' + l for l in lines)
              return f'> {label}\n>\n{quoted}'
          text = re.sub(r'\{%\s*hint\s+style=\"(\w+)\"\s*%\}\s*\n(.*?)\{%\s*endhint\s*%\}', replace_hint, text, flags=re.DOTALL)
          open(sys.argv[1], 'w').write(text)
          " "$f"
            fi
          done

      - name: Build GitBook
        run: |
          npx honkit build . ./public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
